repositories:
  - owner: octocat
    repo: hello-world
    labels:
      - bug
      - needs-review
    priority: high
    allowed_authors:
      - octocat
      - trusted-contributor

  - owner: my-org
    repo: my-app
    labels:
      - claude
    priority: normal
    # allowed_authors を省略した場合は gh api user -q ".login" で取得した現在のユーザーを対象にする
